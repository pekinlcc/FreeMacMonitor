name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload artifacts for (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "${TAG}" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "ref=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building tag: ${TAG}"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Swift version
        run: swift --version

      - name: Build universal .app bundle
        run: |
          set -euxo pipefail
          BIN_NAME="FreeMacMonitor"
          BUNDLE="Free Mac Monitor.app"

          swift build -c release --arch arm64 --arch x86_64

          BINARY=".build/apple/Products/Release/${BIN_NAME}"
          test -f "${BINARY}"

          rm -rf "${BUNDLE}"
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"

          cp "${BINARY}"   "${BUNDLE}/Contents/MacOS/${BIN_NAME}"
          cp Info.plist    "${BUNDLE}/Contents/"
          cp -R Sources/FreeMacMonitor/Resources/ "${BUNDLE}/Contents/Resources/"
          cp AppIcon.icns  "${BUNDLE}/Contents/Resources/AppIcon.icns"

          echo "→ Architectures:"
          lipo -info "${BUNDLE}/Contents/MacOS/${BIN_NAME}"

      - name: Ad-hoc sign
        run: |
          set -euxo pipefail
          codesign --force --deep --sign - --options runtime --timestamp=none "Free Mac Monitor.app"
          codesign --verify --deep --strict --verbose=2 "Free Mac Monitor.app"

      - name: Package zip
        id: pkg
        run: |
          set -euxo pipefail
          TAG="${{ steps.tag.outputs.ref }}"
          ZIP="Free-Mac-Monitor-${TAG}.zip"
          ditto -c -k --sequesterRsrc --keepParent "Free Mac Monitor.app" "${ZIP}"
          shasum -a 256 "${ZIP}" | tee "${ZIP}.sha256"
          ls -la "${ZIP}" "${ZIP}.sha256"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256
          fail_on_unmatched_files: true
